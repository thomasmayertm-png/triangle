# Publishes a locally-made Unity WebGL build to GitHub Pages.
# No Unity licence needed in CI: you build WebGL in Unity into the WebGLBuild/
# folder, commit it, and push. This workflow just deploys those files.
#
# ONE-TIME: repo Settings ▸ Pages ▸ Source = "GitHub Actions".
name: Deploy WebGL to Pages

on:
  push:
    branches: [ master, main ]
    paths:
      - "WebGLBuild/**"
      - ".github/workflows/webgl.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check the build exists
        run: |
          if [ ! -f WebGLBuild/index.html ]; then
            echo "::error::WebGLBuild/index.html not found. Build WebGL in Unity into a"
            echo "::error::folder named WebGLBuild at the repo root, commit it, and push."
            exit 1
          fi
          touch WebGLBuild/.nojekyll   # serve Unity's Build/ folder verbatim

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: WebGLBuild

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
